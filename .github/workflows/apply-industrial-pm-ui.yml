name: Apply Industrial Project UI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: industrial-project-ui
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout redesign branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: pm-industrial-ui

      - name: Restore redesigned source files
        shell: bash
        run: |
          set -euo pipefail
          cat .maintenance/industrial/payload.* | base64 -d > /tmp/industrial-project-ui.tgz
          echo '82b8b2d8c2c874b17507240cc227dab41548cddd68856a603ae3c81ffe50fad3  /tmp/industrial-project-ui.tgz' | sha256sum -c -
          tar -xzf /tmp/industrial-project-ui.tgz -C .
          python - <<'PY'
          from pathlib import Path
          path = Path('src/app/proje-yonetimi/page.tsx')
          text = path.read_text()
          text = text.replace('["kanban", "Kanban", <LayoutDashboard size={14} />]', '["kanban", "Kanban", <LayoutDashboard key="kanban" size={14} />]')
          text = text.replace('["liste", "Liste", <ListTodo size={14} />]', '["liste", "Liste", <ListTodo key="liste" size={14} />]')
          text = text.replace('["takvim", "Takvim", <CalendarDays size={14} />]', '["takvim", "Takvim", <CalendarDays key="takvim" size={14} />]')
          text = text.replace('["analiz", "Analiz", <BarChart3 size={14} />]', '["analiz", "Analiz", <BarChart3 key="analiz" size={14} />]')
          path.write_text(text)
          PY

      - name: Validate restored files
        shell: bash
        run: |
          set -euo pipefail
          echo 'bc972415de96e58e16c31e3e580f2848f06e9ab4  src/app/proje-yonetimi/page.tsx' | sha1sum -c -
          echo '3e0e5f0aa9b8307e254f0ff7226058dd091b31b1  src/app/proje-yonetimi/GorevDetayModal.tsx' | sha1sum -c -
          echo '11bdea678abb0ff8aef4291224559071b40537dd  src/app/proje-yonetimi/AuthEkrani.tsx' | sha1sum -c -
          echo '57ddad39705fef48801a37102ab9368ad15eb497  src/app/proje-yonetimi/layout.tsx' | sha1sum -c -
          echo '76ca9dcfee975a99307374156d11400a4bda7697  src/app/proje-yonetimi/pm.css' | sha1sum -c -
          echo '9e5d33999bcb19eee74f48cb2a2069e64af3486b  src/app/proje-yonetimi/pm-constants.ts' | sha1sum -c -
          echo '86f254f513d8510dc878fb037b02c9b92045bb5d  src/lib/pm-db-supabase.ts' | sha1sum -c -

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.34.3 --activate
          pnpm install --frozen-lockfile

      - name: Run production build
        shell: bash
        run: |
          set -o pipefail
          pnpm run build 2>&1 | tee /tmp/industrial-ui-build.log
        env:
          CI: 'true'

      - name: Publish build error log
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          tail -n 220 /tmp/industrial-ui-build.log > INDUSTRIAL_UI_BUILD_ERROR.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add INDUSTRIAL_UI_BUILD_ERROR.log
          git commit -m 'Capture industrial UI build error' || true
          git push origin HEAD:pm-industrial-ui

      - name: Commit validated redesign
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .maintenance
          rm -f .github/workflows/apply-industrial-pm-ui.yml
          rm -f INDUSTRIAL_UI_BUILD_ERROR.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Redesign project management with restrained Tooldur UI'
          git push origin HEAD:pm-industrial-ui
